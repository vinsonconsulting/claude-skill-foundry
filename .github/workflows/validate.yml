name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Lint skills
        run: python3 scripts/lint_skills.py
      - name: Check index is current
        run: python3 scripts/build_index.py --check
